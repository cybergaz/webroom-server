services:
  postgres-test:
    image: postgres:16-alpine
    container_name: webroom-test-postgres
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: webroom_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d webroom_test"]
      interval: 1s
      timeout: 3s
      retries: 30

  redis-test:
    image: redis:7-alpine
    container_name: webroom-test-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
